<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rione Rinascente - Registro Firme</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff;
            color: #333333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-sizing: border-box;
        }
        
        /* MODIFICATO: Immagine più grande e proporzionata per smartphone */
        img {
            width: 100%;
            max-width: 500px; /* Evita che diventi sproporzionata su PC */
            height: auto;     /* Rimosso il limite di altezza, ora si adatta naturalmente */
            object-fit: contain;
            margin-bottom: 25px;
        }

        .modulo-container {
            width: 90%;
            max-width: 450px;
            background-color: #ffffff;
            padding: 25px;
            border-radius: 12px;
            border: 2px solid #2e7d32;
            box-shadow: 0 8px 24px rgba(46, 125, 50, 0.15);
        }
        .modulo-container h3 {
            margin-top: 0;
            margin-bottom: 10px;
            text-align: center;
            color: #2e7d32;
            font-size: 22px;
        }
        .messaggio-motivazionale {
            text-align: center;
            font-size: 15px;
            color: #555555;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        label {
            display: block;
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
            color: #2e7d32;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            background-color: #f9f9f9;
            color: #333333;
            box-sizing: border-box;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #2e7d32;
            background-color: #ffffff;
        }
        textarea {
            resize: vertical;
            height: 90px;
        }
        button {
            width: 100%;
            padding: 14px;
            margin-top: 25px;
            background-color: #2e7d32;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover {
            background-color: #1b5e20;
        }
        button:active {
            transform: scale(0.98);
        }
        #messaggio-stato {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <img src="foto.jpeg" alt="Lasciapassare del Rione">

    <div class="modulo-container">
        <h3>Costruiamo insieme il futuro!</h3>
        <p class="messaggio-motivazionale">
            La forza del Rione sono le persone. Lascia il tuo contatto per restare aggiornato e aiutaci a rendere le prossime edizioni ancora più memorabili. Ogni idea conta!
        </p>
        
        <form id="form-firme">
            <label for="nome">Nome e Contatto (Email o Telefono):</label>
            <input type="text" id="nome" name="nome" required placeholder="Es. Mario Rossi - mario@email.com">

            <label for="messaggio">Aiutaci a migliorare, lascia il tuo pensiero:</label>
            <textarea id="messaggio" name="messaggio" required placeholder="Cosa ti è piaciuto di più? Cosa vorresti vedere la prossima volta?"></textarea>

            <button type="submit" id="btn-invia">Invia al Rione</button>
        </form>

        <div id="messaggio-stato"></div>
    </div>

    <script>
        const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycby8IRPy_tWKXTJSMSv3JFMI86H-NfGwgckXRhC1yYAzpHPR6VteFQs9aq07rdwe1JhDLA/exec";

        document.getElementById('form-firme').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const btn = document.getElementById('btn-invia');
            const stato = document.getElementById('messaggio-stato');
            
            btn.disabled = true;
            btn.innerText = "Invio in corso...";
            stato.style.display = "none";

            const formData = new FormData(this);
            const dataInviata = new URLSearchParams(formData);

            fetch(URL_APPS_SCRIPT, {
                method: 'POST',
                mode: 'no-cors', 
                body: dataInviata
            })
            .then(() => {
                stato.style.display = "block";
                stato.style.backgroundColor = "#e8f5e9"; 
                stato.style.color = "#2e7d32"; 
                stato.style.border = "1px solid #2e7d32";
                stato.innerHTML = "Grazie per il tuo contributo! Il tuo messaggio è arrivato.";
                document.getElementById('form-firme').reset(); 
            })
            .catch(error => {
                console.error('Errore durante la fetch:', error);
                stato.style.display = "block";
                stato.style.backgroundColor = "#ffebee";
                stato.style.color = "#c62828";
                stato.style.border = "1px solid #c62828";
                stato.innerHTML = "Si è verificato un errore di connessione. Riprova.";
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerText = "Invia al Rione";
            });
        });
    </script>

</body>
</html>
